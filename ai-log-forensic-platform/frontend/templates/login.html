<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Login - AI Log Forensics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            base: '#0f172a',
                            dark: '#020617',
                            accent: '#00ff99',
                            muted: '#66ffcc'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 153, 0.2); }
        .glow-overlay { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,255,153,0.1) 0%, rgba(2,6,23,0) 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center relative overflow-hidden">
    
    <div class="glow-overlay"></div>

    <div class="glass-panel p-10 rounded-2xl shadow-[0_0_50px_rgba(0,255,153,0.1)] w-full max-w-md relative z-10 mx-4">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-accent/10 border border-brand-accent/30 text-brand-accent text-3xl mb-4 shadow-[0_0_20px_rgba(0,255,153,0.2)]">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">AI <span class="text-brand-accent">SOC</span> Forensics</h1>
            <p class="text-brand-muted text-sm">Secure Authentication Gateway</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-brand-muted mb-1.5"><i class="fa-solid fa-user mr-1 text-xs outline-none"></i> Operator ID</label>
                <div class="relative">
                    <input type="text" id="username" placeholder="Enter username" class="w-full bg-black/50 border border-brand-accent/30 text-white rounded-lg focus:ring-brand-accent focus:border-brand-accent block p-3 transition-colors" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-brand-muted mb-1.5"><i class="fa-solid fa-lock mr-1 text-xs"></i> Credential Key</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="Enter password" class="w-full bg-black/50 border border-brand-accent/30 text-white rounded-lg focus:ring-brand-accent focus:border-brand-accent block p-3 transition-colors" required>
                </div>
            </div>

            <div id="error-msg" class="hidden font-medium text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg p-3 text-sm text-center">
                Authentication Failed
            </div>

            <button onclick="login()" class="w-full bg-brand-accent text-brand-dark hover:bg-brand-accent/90 transition-all shadow-[0_0_15px_rgba(0,255,153,0.3)] hover:shadow-[0_0_25px_rgba(0,255,153,0.5)] px-4 py-3 rounded-lg text-base font-bold flex items-center justify-center gap-2 mt-4">
                Initialize Session <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </div>

        <div class="mt-8 text-center text-sm text-brand-muted border-t border-brand-accent/20 pt-6">
            Unauthorized access prohibited.<br>
            <a href="/register" class="text-brand-accent hover:underline mt-2 inline-block font-medium">Request Platform Access</a>
        </div>

    </div>

    <script>
    function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const error = document.getElementById("error-msg");
        const btn = document.querySelector("button");

        error.classList.add("hidden");

        if (!username || !password) {
            error.innerText = "Credentials required";
            error.classList.remove("hidden");
            return;
        }

        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...`;

        fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        })
        .then(res => {
            if (res.status === 200) {
                window.location.href = "/dashboard";
            } else {
                error.innerText = "Invalid credentials";
                error.classList.remove("hidden");
                btn.innerHTML = `Initialize Session <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
            }
        })
        .catch(() => {
            error.innerText = "Connection timeout";
            error.classList.remove("hidden");
            btn.innerHTML = `Initialize Session <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
        });
    }

    // Connect Enter key
    document.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            login();
        }
    });
    </script>
</body>
</html>
