<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Forensic Login</title>

    <style>
        body {
            background: radial-gradient(circle at top, #0b132b, #000);
            font-family: "Segoe UI", Arial, sans-serif;
            color: #00ff99;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: rgba(17, 24, 39, 0.95);
            padding: 35px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 153, 0.35);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #00ff99;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background: #020617;
            border: 1px solid #00ff99;
            color: #00ff99;
            border-radius: 6px;
            font-size: 15px;
        }

        input::placeholder {
            color: #66ffcc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: linear-gradient(135deg, #00ff99, #00cc77);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s ease;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(0,255,153,0.6);
        }

        .error {
            color: #ff4d4d;
            text-align: center;
            margin-top: 12px;
            display: none;
            font-size: 14px;
        }

        footer {
            margin-top: 18px;
            font-size: 12px;
            color: #66ffcc;
        }

        .register-link {
            margin-top: 12px;
            font-size: 13px;
        }

        .register-link a {
            color: #00ff99;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔐 Cyber Forensic Login</h2>

    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <button onclick="login()">Login</button>

    <div class="error" id="error-msg"></div>

    <div class="register-link">
        New user? <a href="/register">Create account</a>
    </div>

    <footer>
        AI-Based Log Investigation Platform
    </footer>
</div>

<script>
function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const error = document.getElementById("error-msg");

    error.style.display = "none";

    if (!username || !password) {
        error.innerText = "Username and password required";
        error.style.display = "block";
        return;
    }

    fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => {
        if (res.status === 200) {
            window.location.href = "/dashboard";
        } else {
            error.innerText = "Invalid username or password";
            error.style.display = "block";
        }
    })
    .catch(() => {
        error.innerText = "Server error";
        error.style.display = "block";
    });
}
</script>

</body>
</html>
