<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SOC Dashboard - AI Log Forensics{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            base: '#0f172a',
                            dark: '#020617',
                            accent: '#00ff99',
                            muted: '#66ffcc'
                        }
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Styles -->
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #e2e8f0; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 153, 0.2); }
        .sidebar-link { transition: all 0.3s ease; }
        .sidebar-link:hover { background-color: rgba(0, 255, 153, 0.1); color: #00ff99; border-right: 3px solid #00ff99; }
        .active-link { background-color: rgba(0, 255, 153, 0.15); color: #00ff99; border-right: 3px solid #00ff99; }
        table th { background-color: rgba(15, 23, 42, 0.9); border-bottom: 2px solid #00ff99; color: #00ff99; }
        table td { border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        table tr:hover { background-color: rgba(255, 255, 255, 0.02); }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 flex-shrink-0 border-r border-brand-accent/30 bg-brand-dark flex flex-col justify-between">
        <div>
            <div class="h-16 flex items-center px-6 border-b border-brand-accent/30">
                <i class="fa-solid fa-shield-halved text-brand-accent text-2xl mr-3"></i>
                <span class="text-xl font-bold text-white tracking-wider">AI <span class="text-brand-accent">SOC</span></span>
            </div>
            
            <nav class="mt-6 flex flex-col gap-1">
                <a href="/dashboard" class="sidebar-link px-6 py-3 text-brand-muted flex items-center {% if request.path == '/dashboard' %}active-link{% endif %}">
                    <i class="fa-solid fa-chart-pie w-6"></i> Dashboard
                </a>
                <a href="/systems" class="sidebar-link px-6 py-3 text-brand-muted flex items-center {% if request.path == '/systems' %}active-link{% endif %}">
                    <i class="fa-solid fa-server w-6"></i> Systems
                </a>
                <a href="/logs" class="sidebar-link px-6 py-3 text-brand-muted flex items-center {% if request.path == '/logs' %}active-link{% endif %}">
                    <i class="fa-solid fa-list-ul w-6"></i> Logs
                </a>
                <a href="/incidents" class="sidebar-link px-6 py-3 text-brand-muted flex items-center {% if request.path == '/incidents' %}active-link{% endif %}">
                    <i class="fa-solid fa-ticket w-6"></i> Incident Cases
                </a>
                <a href="/reports" class="sidebar-link px-6 py-3 text-brand-muted flex items-center {% if request.path == '/reports' %}active-link{% endif %}">
                    <i class="fa-solid fa-file-pdf w-6"></i> Reports
                </a>
                <a href="/settings" class="sidebar-link px-6 py-3 text-brand-muted flex items-center {% if request.path == '/settings' %}active-link{% endif %}">
                    <i class="fa-solid fa-gear w-6"></i> Settings
                </a>
            </nav>
        </div>
        
        <div class="p-6 border-t border-brand-accent/30">
            <a href="/" class="flex items-center text-red-400 hover:text-red-300 transition-colors">
                <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        
        <!-- Top Header -->
        <header class="h-16 flex-shrink-0 border-b border-brand-accent/20 bg-brand-base flex items-center justify-between px-8">
            <h2 class="text-xl font-semibold text-white">{% block header_title %}Dashboard{% endblock %}</h2>
            <div class="flex items-center gap-4">
                <button class="text-brand-muted hover:text-white transition-colors">
                    <i class="fa-regular fa-bell text-xl"></i>
                </button>
                <div class="h-8 w-8 rounded-full bg-brand-accent/20 flex items-center justify-center text-brand-accent border border-brand-accent">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </header>

        <!-- Scrollable content area -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-[#0b0f1a] p-8">
            {% block content %}{% endblock %}
        </main>
        
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
