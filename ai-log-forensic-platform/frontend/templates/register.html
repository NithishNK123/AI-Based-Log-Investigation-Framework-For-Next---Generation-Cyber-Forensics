<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | AI Log Forensic Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            background: #0f172a;
            color: #e5e7eb;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-box {
            background: #020617;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        h2 {
            text-align: center;
            color: #22d3ee;
        }

        input, select, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        input {
            background: #020617;
            border: 1px solid #334155;
            color: #e5e7eb;
        }

        select, button {
            background: #22d3ee;
            color: #020617;
            font-weight: bold;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2>Create Account</h2>

    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <select id="role">
        <option value="analyst">Analyst</option>
        <option value="admin">Admin</option>
    </select>

    <button onclick="registerUser()">Register</button>

    <p class="msg" id="message"></p>

    <p style="text-align:center;margin-top:15px;">
        Already have an account?
        <a href="/" style="color:#22d3ee;">Login</a>
    </p>
</div>

<script>
function registerUser() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;
    const message = document.getElementById("message");

    if (!username || !password) {
        message.innerText = "Please fill all fields";
        message.style.color = "red";
        return;
    }

    fetch("/api/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password,
            role: role
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "registered") {
            message.innerText = "Registration successful! Redirecting...";
            message.style.color = "lightgreen";
            setTimeout(() => {
                window.location.href = "/";
            }, 1500);
        } else {
            message.innerText = data.error || "Registration failed";
            message.style.color = "red";
        }
    })
    .catch(() => {
        message.innerText = "Server error";
        message.style.color = "red";
    });
}
</script>

</body>
</html>
