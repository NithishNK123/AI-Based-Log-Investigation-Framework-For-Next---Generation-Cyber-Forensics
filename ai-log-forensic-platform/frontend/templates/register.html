<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Access - AI Log Forensics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            base: '#0f172a',
                            dark: '#020617',
                            accent: '#00ff99',
                            muted: '#66ffcc'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 153, 0.2); }
        .glow-overlay { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,255,153,0.1) 0%, rgba(2,6,23,0) 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center relative overflow-hidden">
    
    <div class="glow-overlay"></div>

    <div class="glass-panel p-10 rounded-2xl shadow-[0_0_50px_rgba(0,255,153,0.1)] w-full max-w-md relative z-10 mx-4">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight mb-2">Request Platform Access</h1>
            <p class="text-brand-muted text-sm">Provision a new SOC Operator account.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-brand-muted mb-1.5"><i class="fa-solid fa-user-plus mr-1 text-xs outline-none"></i> Desired Username</label>
                <div class="relative">
                    <input type="text" id="username" placeholder="Choose a username" class="w-full bg-black/50 border border-brand-accent/30 text-white rounded-lg focus:ring-brand-accent focus:border-brand-accent block p-3 transition-colors" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-brand-muted mb-1.5"><i class="fa-solid fa-key mr-1 text-xs"></i> Strong Password</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="Create a password" class="w-full bg-black/50 border border-brand-accent/30 text-white rounded-lg focus:ring-brand-accent focus:border-brand-accent block p-3 transition-colors" required>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-brand-muted mb-1.5"><i class="fa-solid fa-id-badge mr-1 text-xs"></i> Clearance Level</label>
                <div class="relative">
                    <select id="role" class="w-full bg-black/50 border border-brand-accent/30 text-white rounded-lg focus:ring-brand-accent focus:border-brand-accent block p-3 transition-colors appearance-none">
                        <option value="analyst">SOC Analyst (Standard)</option>
                        <option value="admin">Platform Administrator (Elevated)</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-brand-muted pointer-events-none"></i>
                </div>
            </div>

            <div id="message" class="hidden font-medium rounded-lg p-3 text-sm text-center"></div>

            <button onclick="registerUser()" class="w-full bg-brand-accent text-brand-dark hover:bg-brand-accent/90 transition-all shadow-[0_0_15px_rgba(0,255,153,0.3)] hover:shadow-[0_0_25px_rgba(0,255,153,0.5)] px-4 py-3 rounded-lg text-base font-bold flex items-center justify-center gap-2 mt-2">
                Provision Account <i class="fa-solid fa-user-check"></i>
            </button>
        </div>

        <div class="mt-8 text-center text-sm text-brand-muted border-t border-brand-accent/20 pt-6">
            Already have clearance?<br>
            <a href="/" class="text-brand-accent hover:underline mt-2 inline-block font-medium">Return to Login Gateway</a>
        </div>

    </div>

<script>
function showMessage(text, isError = true) {
    const msg = document.getElementById("message");
    msg.innerText = text;
    msg.classList.remove("hidden", "bg-red-500/10", "border-red-500/20", "text-red-400", "bg-emerald-500/10", "border-emerald-500/20", "text-emerald-400");
    
    if (isError) {
        msg.classList.add("bg-red-500/10", "border", "border-red-500/20", "text-red-400");
    } else {
        msg.classList.add("bg-emerald-500/10", "border", "border-emerald-500/20", "text-emerald-400");
    }
}

function registerUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;
    const btn = document.querySelector("button");

    document.getElementById("message").classList.add("hidden");

    if (!username || !password) {
        showMessage("All fields are required.", true);
        return;
    }

    btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Provisioning...`;
    btn.disabled = true;

    fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password, role })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "registered") {
            showMessage("Clearance granted. Redirecting to gateway...", false);
            setTimeout(() => window.location.href = "/", 1500);
        } else {
            showMessage(data.error || "Provisioning failed.", true);
            btn.innerHTML = `Provision Account <i class="fa-solid fa-user-check"></i>`;
            btn.disabled = false;
        }
    })
    .catch(() => {
        showMessage("Server connection failed.", true);
        btn.innerHTML = `Provision Account <i class="fa-solid fa-user-check"></i>`;
        btn.disabled = false;
    });
}
</script>

</body>
</html>
